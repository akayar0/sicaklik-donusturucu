<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sıcaklık Dönüştürücü</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1 class="ana-baslik">SICAKLIK DÖNÜŞTÜRÜCÜ</h1>
<div id="container">
    <div id="donusturuculer">
        <div class="input-grup">
            <label for="cel">Celcius (°C)</label>
            <input type="number" id="cel" oninput="celToFah()">
        </div>

        <div class="input-grup">
            <label for="feh">Fahrenheit (°F)</label>
            <input type="number" id="feh" oninput="fahToCel()">
        </div>
    </div>
</div>
</body>

<script>
    const cel = document.getElementById("cel")
    const feh = document.getElementById("feh")

    function celToFah(){
        let output = (parseFloat(cel.value)*9/5)+32;
        feh.value=parseFloat(output.toFixed(2));
    }

    function fahToCel(){
        let output = (parseFloat(feh.value)-32)*5/9;
        cel.value=parseFloat(output.toFixed(2));
    }
</script>
</html>
